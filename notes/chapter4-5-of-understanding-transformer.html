<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Understanding Transformers — ch.4–5</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 1rem; color: #111; }
    .page { max-width: 980px; margin: 0 auto; }
    pre { background:#f6f8fa; padding:0.75rem; overflow:auto }
    img { max-width: 100%; height: auto; }
    footer { margin-top: 2rem; color:#555 }
  </style>
</head>
<body>
  <div class="page">
    <article id="content">Loading note…</article>
    <footer>
      PDF (if available): <a id="pdfLink" href="chapter4-5-of-understanding-transformer.pdf">chapter4-5-of-understanding-transformer.pdf</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function(){
      try{
        const mdPath = `chapter4-5 of understanding transformer.md`;
        const res = await fetch(encodeURI(mdPath));
        const md = await res.text();
        document.getElementById('content').innerHTML = marked.parse(md);
      }catch(e){
        document.getElementById('content').textContent = 'Failed to load note.';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
